<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page { width: 3.5in; height: 2in; margin: 0; }

  body {
    width: 3.5in;
    height: 2in;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  /* ===== FRONT ===== */
  .front {
    width: 3.5in;
    height: 2in;
    background: radial-gradient(ellipse at 30% 50%, #2a2a2a 0%, #0e0e0e 60%);
    border: 3px solid #c8922a;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    page-break-after: always;
    position: relative;
    overflow: hidden;
  }
  .front::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #c8922a, #f0c050, #c8922a);
  }
  .front .logo-img { width: 60px; height: 60px; border-radius: 50%; }
  .front .brand-name {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #fff;
    text-transform: uppercase;
  }
  .front .brand-name span { color: #f0a500; }
  .front .divider { width: 36px; height: 2px; background: #f0a500; }
  .front .tagline {
    font-size: 6.5px;
    letter-spacing: 2.5px;
    color: #aaa;
    text-transform: uppercase;
  }

  /* ===== BACK ===== */
  .back {
    width: 3.5in;
    height: 2in;
    display: flex;
    border: 3px solid #c8922a;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .back::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, #c8922a, #f0c050, #c8922a);
    z-index: 10;
  }
  .back::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #c8922a, #f0c050, #c8922a);
    z-index: 10;
  }

  /* Left dark half */
  .back-left {
    width: 44%;
    background: radial-gradient(ellipse at 40% 50%, #2a2a2a 0%, #0e0e0e 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px;
  }
  .back-left .logo-img { width: 52px; height: 52px; border-radius: 50%; }
  .back-left .brand-name {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    text-align: center;
  }
  .back-left .brand-name span { color: #f0a500; }
  .back-left .tagline {
    font-size: 5px;
    letter-spacing: 1.5px;
    color: #888;
    text-transform: uppercase;
    text-align: center;
  }

  /* Right white half */
  .back-right {
    width: 56%;
    background: #fff;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 14px 10px 14px 16px;
  }

  .contact-list { display: flex; flex-direction: column; gap: 10px; }
  .contact-item { display: flex; align-items: center; gap: 7px; }
  .contact-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #f0a500;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg { width: 11px; height: 11px; fill: #1a1a1a; }
  .contact-text { display: flex; flex-direction: column; }
  .contact-label {
    font-size: 5px;
    letter-spacing: 1.5px;
    color: #f0a500;
    text-transform: uppercase;
    font-weight: 700;
  }
  .contact-value { font-size: 7px; color: #1a1a1a; font-weight: 600; }

  .qr-section { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .qr-box {
    width: 60px; height: 60px;
    border: 2.5px solid #f0a500;
    border-radius: 4px;
    padding: 3px;
    background: #fff;
  }
  .qr-box img { width: 100%; height: 100%; display: block; }
  .scan-label { font-size: 5px; letter-spacing: 1.5px; color: #888; text-transform: uppercase; }
</style>
</head>
