<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>American Select – Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
      padding: 40px;
      font-family: 'Montserrat', sans-serif;
    }

    .label {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: center;
    }

    /* Standard business card: 3.5in × 2in at 96dpi = 336px × 192px
       We scale up 3× for quality: 1008px × 576px                     */
    .card {
      width: 1008px;
      height: 576px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
      flex-shrink: 0;
    }

    /* ─────────────── FRONT ─────────────── */
    .card-front {
      background: #111111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 64px;
      position: relative;
      overflow: hidden;
    }

    /* Gold corner accent top-left */
    .card-front::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 220px; height: 220px;
      background: radial-gradient(circle at top left, rgba(240,165,0,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Gold corner accent bottom-right */
    .card-front::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 220px; height: 220px;
      background: radial-gradient(circle at bottom right, rgba(240,165,0,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Subtle gold top border line */
    .gold-line-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #f0a500 30%, #f0a500 70%, transparent);
    }

    .gold-line-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #f0a500 30%, #f0a500 70%, transparent);
    }

    .front-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 1;
    }

    .logo-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(240,165,0,0.4), 0 8px 24px rgba(0,0,0,0.4);
    }

    .logo-wrap img {
      width: 88px;
      height: 88px;
      object-fit: contain;
    }

    .brand-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 38px;
      font-weight: 800;
      color: white;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
    }

    .brand-name span {
      color: #f0a500;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #f0a500;
      border-radius: 2px;
    }

    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
    }

    /* ─────────────── BACK ─────────────── */
    .card-back {
      background: white;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* Left gold stripe */
    .back-stripe {
      width: 14px;
      background: #f0a500;
      flex-shrink: 0;
    }

    /* Dark left panel */
    .back-left {
      width: 340px;
      background: #111111;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 36px;
      gap: 16px;
      position: relative;
    }

    .back-left::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, #f0a500 30%, #f0a500 70%, transparent);
    }

    .back-logo-wrap {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 0 3px rgba(240,165,0,0.5);
    }

    .back-logo-wrap img {
      width: 66px;
      height: 66px;
      object-fit: contain;
    }

    .back-brand {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
    }

    .back-brand span { color: #f0a500; }

    .back-tagline {
      font-size: 10px;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    /* Right contact panel */
    .back-right {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 36px 36px 36px 40px;
      gap: 28px;
    }

    .back-contacts {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      background: #f0a500;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 17px;
      height: 17px;
      fill: #111111;
    }

    .contact-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .contact-label {
      font-size: 9px;
      font-weight: 700;
      color: #f0a500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .contact-value {
      font-size: 14px;
      font-weight: 600;
      color: #111111;
      letter-spacing: 0.5px;
    }

    .contact-value.small {
      font-size: 12px;
    }

    /* QR code section */
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .qr-frame {
      width: 160px;
      height: 160px;
      border: 3px solid #f0a500;
      border-radius: 10px;
      padding: 6px;
      background: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .qr-label {
      font-size: 9px;
      font-weight: 700;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    /* Bottom gold bar */
    .back-bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #f0a500, #111111 50%, #f0a500);
    }
  </style>
</head>
<body>

  <div class="label">FRONT</div>
  <div class="card card-front">
    <div class="gold-line-top"></div>
    <div class="gold-line-bottom"></div>
    <div class="front-content">
      <div class="logo-wrap">
        <img src="Images/Pages/AS Logo new.png" alt="American Select Logo" />
      </div>
      <div class="brand-name">American <span>Select</span></div>
      <div class="divider"></div>
      <div class="tagline">Quality Goods from USA &amp; Canada</div>
    </div>
  </div>

  <div class="label">BACK</div>
  <div class="card card-back">
    <div class="back-stripe"></div>

    <div class="back-left">
      <div class="back-logo-wrap">
        <img src="Images/Pages/AS Logo new.png" alt="American Select Logo" />
      </div>
      <div class="back-brand">American <span>Select</span></div>
      <div class="back-tagline">Imported. Trusted. Delivered.</div>
    </div>

    <div class="back-right">

      <div class="back-contacts">
        <!-- WhatsApp -->
        <div class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">WhatsApp</span>
            <span class="contact-value">+237 670 35 85 51</span>
          </div>
        </div>

        <!-- Website -->
        <div class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">Website</span>
            <span class="contact-value">americanselect.net</span>
          </div>
        </div>

        <!-- Location -->
        <div class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">Location</span>
            <span class="contact-value small">Yaoundé, Cameroon</span>
          </div>
        </div>
      </div>

      <!-- QR Code -->
      <div class="qr-section">
        <div class="qr-frame">
          <img src="qr-code.png" alt="Scan to visit americanselect.net" />
        </div>
        <div class="qr-label">Scan to Shop</div>
      </div>

    </div>

    <div class="back-bottom-bar"></div>
  </div>

</body>
</html>
